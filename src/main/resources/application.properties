spring.application.name=galeria-ney
server.port=3000

# O Docker Compose vai sobrescrever esse localhost pelo nome do container do banco
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/galeria_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
cloudinary.url=${CLOUDINARY_URL}

api.security.token.secret=${JWT_SECRET:senhajwt}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true