  name: Pipeline de Integracao Continua (CI)

  # Define QUANDO o robô deve rodar
  on:
    push:
      branches: [ "main", "master" ]
    pull_request:
      branches: [ "main", "master" ]

  jobs:
    build-and-test:
      name: Compilar e Testar API
      runs-on: ubuntu-latest # O robô vai usar um servidor Linux Ubuntu

      steps:
        # Passo 1: Baixar o seu código do repositório
        - name: Fazer Checkout do Codigo
          uses: actions/checkout@v4

        # Passo 2: Instalar o Java 21 no servidor do robô
        - name: Configurar JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: maven # Salva as dependências em cache para os próximos testes serem mais rápidos

        # Passo 3: Rodar o Maven para compilar o projeto e executar o JUnit
        - name: Executar Testes com Maven
          run: ./mvnw clean verify